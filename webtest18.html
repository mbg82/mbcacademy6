<html>

    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
     <title> html tag input</title>
    </head>

    <body>
        <form method="get" action="">
        <input type="text" name="my_id" size="20" maxlength="20"
        value="이름을 입력하세요!">

        <p><br>

        ID : <input type="text" name="id" size="20" 
            maxlength="20" value="아이디를 입력하세요">
        <p>
        PW : <input type="password" name="password" size="20" 
            maxlength="20" value="1234">
            
        <p><br>

        * 평소에 선호하는 언어의 종류를 고르시오 *<br>
        <input type="checkbox" name="cb1" value="C++">C++
        <input type="checkbox" name="cb2" value="자바" checked>자바
        <input type="checkbox" name="cb3" value="아랍어">아랍어
        <input type="checkbox" name="cb4" value="자바스크립트">자바스크립트
        <input type="checkbox" name="cb5" value="안드로이드">안드로이드
        </form>
    </body>

</html>
